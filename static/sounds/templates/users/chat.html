{% for msg in chat_messages %}
    {% if msg.sender == request.user %}
        <div class="align-self-end text-end" style="max-width: 85%;">
            <div class="d-inline-block p-2 rounded-4 mb-1 text-start" style="background: rgba(0, 255, 148, 0.15); border: 1px solid rgba(0, 255, 148, 0.4); color: #fff; border-bottom-right-radius: 4px !important;">
                {{ msg.content|linebreaksbr }}
            </div>
            <div class="small text-muted" style="font-size: 0.65rem;">{{ msg.created_at|date:"H:i" }}</div>
        </div>
    {% else %}
        <div class="align-self-start" style="max-width: 85%;">
            <div class="d-inline-block p-2 rounded-4 mb-1 text-start" style="background: rgba(192, 132, 252, 0.15); border: 1px solid rgba(192, 132, 252, 0.4); color: #fff; border-bottom-left-radius: 4px !important;">
                {{ msg.content|linebreaksbr }}
            </div>
            <div class="small text-muted" style="font-size: 0.65rem;">{{ msg.created_at|date:"H:i" }}</div>
        </div>
    {% endif %}
{% empty %}
    <div class="m-auto text-center text-muted">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <p class="small">No messages yet. Say hi!</p>
    </div>
{% endfor %}

<script>
    var cb = document.getElementById("chat-box");
    if(cb) cb.scrollTop = cb.scrollHeight;
</script>
