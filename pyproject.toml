[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "squadup.settings"
python_files = ["test_*.py", "*_test.py", "tests.py"]

[tool.black]
line-length = 100
target-version = ["py310"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.nox
  | \.tox
  | \.venv
  | venv
  | _build
  | buck-out
  | build
  | dist
  | __pypackages__
  | migrations
)/
'''
[tool.coverage.run]
omit = [
    "*/migrations/*",
    "manage.py",
    "squadup/asgi.py",
    "squadup/wsgi.py",
    "fix_*.py",
    "force_fix_*.py",
    "setup_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __str__",
]